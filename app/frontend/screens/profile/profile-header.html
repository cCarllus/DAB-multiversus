<section class="profile-hero" aria-label="__PROFILE_HERO_ARIA_LABEL__">
  <div class="profile-hero__avatar-slot" data-avatar-slot></div>

  <div class="profile-hero__copy">
    <div class="profile-hero__heading">
      <div class="profile-hero__name-slot" data-name-slot></div>

      <div class="profile-hero__status-shell">
        <span class="profile-status-badge" data-launcher-status-badge>
          <span class="profile-status-badge__signal" aria-hidden="true"></span>
          <span data-launcher-status></span>
        </span>
      </div>
    </div>

    <p class="profile-hero__summary">__PROFILE_HERO_SUMMARY__</p>

    <div class="profile-hero__intel">
      <div class="profile-hero__intel-group">
        <span class="profile-hero__intel-label">__PROFILE_MEMBER_SINCE_LABEL__</span>
        <strong class="profile-hero__intel-value" data-member-since></strong>
      </div>

      <div class="profile-hero__intel-group">
        <span class="profile-hero__intel-label">__PROFILE_USER_ID_LABEL__</span>
        <strong class="profile-hero__intel-value" data-user-id-value></strong>
      </div>

      <div class="profile-hero__intel-group">
        <span class="profile-hero__intel-label">__PROFILE_LANGUAGE_LABEL__</span>
        <strong class="profile-hero__intel-value" data-language-value></strong>
      </div>

      <div class="profile-hero__intel-group">
        <span class="profile-hero__intel-label">__PROFILE_TRUSTED_DEVICE_LABEL__</span>
        <strong class="profile-hero__intel-value" data-trusted-device></strong>
      </div>
    </div>
  </div>
</section>
