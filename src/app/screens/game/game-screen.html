<section class="game-screen" aria-label="__GAME_SCREEN_ARIA_LABEL__">
  <div class="game-screen__backdrop" aria-hidden="true">
    <img class="game-screen__background-image" data-game-background alt="" />
    <div class="game-screen__background-overlay"></div>
  </div>

  <div class="game-screen__content">
    <img class="game-screen__brand" data-game-brand alt="__GAME_BRAND_ALT__" />
    <p class="game-screen__eyebrow">__GAME_EYEBROW__</p>
    <h1 class="game-screen__title">__GAME_TITLE__</h1>
    <p class="game-screen__summary">__GAME_SUMMARY__</p>

    <div class="game-screen__panel">
      <div class="game-screen__panel-row">
        <span class="game-screen__label">__GAME_AUTHENTICATED_AS_LABEL__</span>
        <strong class="game-screen__value" data-game-user-display></strong>
      </div>
      <div class="game-screen__panel-row">
        <span class="game-screen__label">__GAME_ACCOUNT_LABEL__</span>
        <strong class="game-screen__value" data-game-user-email></strong>
      </div>
      <div class="game-screen__panel-row">
        <span class="game-screen__label">__GAME_CLIENT_LABEL__</span>
        <strong class="game-screen__value">__GAME_CLIENT_VERSION__</strong>
      </div>
    </div>

    <div class="game-screen__actions">
      <button type="button" class="game-screen__button" data-action="game-return-menu">
        __GAME_RETURN_TO_MENU__
      </button>
    </div>
  </div>
</section>
