  <div class="home-screen__background" aria-hidden="true">
    <img
      src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/917d6f93-fb36-439a-8c48-884b67b35381_1600w.jpg"
      alt=""
      class="home-screen__background-image"
    />
    <div class="home-screen__background-layer home-screen__background-layer--top"></div>
    <div class="home-screen__background-layer home-screen__background-layer--side"></div>
    <div class="home-screen__background-layer home-screen__background-layer--vignette"></div>
    <div class="home-screen__background-noise"></div>
  </div>

  <div class="home-screen__fps">60 FPS</div>

  <div class="home-screen__frame">
    <nav class="home-topbar" aria-label="Primary navigation">
      <div class="home-topbar__left">
        <button
          type="button"
          class="home-topbar__wedge home-topbar__wedge--utility"
          aria-label="Settings"
        >
          <span class="home-topbar__wedge-content">
            <svg class="home-icon home-icon--medium"><use href="#icon-settings"></use></svg>
            <span class="home-topbar__divider" aria-hidden="true"></span>
            <span class="home-topbar__chevrons" aria-hidden="true">
              <svg class="home-icon home-icon--small home-icon--filled is-flipped">
                <use href="#icon-play"></use>
              </svg>
              <svg class="home-icon home-icon--small home-icon--filled is-flipped">
                <use href="#icon-play"></use>
              </svg>
            </span>
          </span>
        </button>

        <div class="home-topbar__logo-block" aria-hidden="true">
          <div class="home-topbar__logo-core">
            <span class="home-topbar__logo-diamond"></span>
            <span class="home-topbar__logo-spark home-topbar__logo-spark--left"></span>
            <span class="home-topbar__logo-spark home-topbar__logo-spark--right"></span>
            <span class="home-topbar__logo-gem"></span>
          </div>
        </div>

        <button type="button" class="home-topbar__tab">
          <span class="home-topbar__tab-label">Heroes</span>
        </button>
        <button type="button" class="home-topbar__tab">
          <span class="home-topbar__tab-label">Store</span>
        </button>
        <button type="button" class="home-topbar__tab">
          <span class="home-topbar__tab-label">Watch</span>
        </button>
        <button type="button" class="home-topbar__tab">
          <span class="home-topbar__tab-label">Codex</span>
        </button>
        <button type="button" class="home-topbar__tab">
          <span class="home-topbar__tab-label">Vault</span>
        </button>
        <div class="home-topbar__fill" aria-hidden="true"></div>
      </div>

      <div class="home-topbar__right">
        <button type="button" class="home-currency" aria-label="Shards">
          <span class="home-currency__icon" aria-hidden="true">
            <span class="home-currency__icon-top"></span>
            <span class="home-currency__icon-bottom"></span>
            <span class="home-currency__icon-highlight"></span>
          </span>
          <span class="home-currency__copy">
            <span class="home-currency__value">145,800</span>
            <span class="home-currency__label">Shards</span>
          </span>
        </button>

        <button type="button" class="home-topbar__mini-block" aria-label="Inbox and security">
          <span class="home-topbar__mini-content">
            <svg class="home-icon home-icon--medium"><use href="#icon-mail"></use></svg>
            <span class="home-topbar__shield-wrap">
              <svg class="home-icon home-icon--medium"><use href="#icon-shield"></use></svg>
              <span class="home-topbar__shield-strike"></span>
            </span>
          </span>
        </button>

        <button
          type="button"
          class="home-topbar__mini-block home-topbar__mini-block--gold"
          aria-label="Add currency"
        >
          <span class="home-topbar__mini-content">
            <span class="home-topbar__hexagon-wrap">
              <svg class="home-icon home-icon--large"><use href="#icon-hexagon"></use></svg>
              <svg class="home-icon home-icon--small home-topbar__hexagon-plus">
                <use href="#icon-plus"></use>
              </svg>
            </span>
          </span>
        </button>

        <button
          type="button"
          class="home-topbar__mini-block home-topbar__mini-block--power"
          aria-label="Power"
        >
          <span class="home-topbar__mini-content">
            <svg class="home-icon home-icon--medium"><use href="#icon-power"></use></svg>
          </span>
        </button>
      </div>
    </nav>

    <main class="home-content">
      <aside class="home-panel-column home-panel-column--left">
        <section class="home-card home-profile-card">
          <div class="home-card__sheen" aria-hidden="true"></div>
          <div class="home-profile-card__header">
            <div class="home-profile-card__identity">
              <div class="home-profile-card__avatar-wrap">
                <img
                  src="https://i.pravatar.cc/150?img=11"
                  alt=""
                  class="home-profile-card__avatar"
                />
                <span class="home-profile-card__level">42</span>
              </div>
              <div class="home-profile-card__copy">
                <strong class="home-profile-card__name">__PLAYER_ALIAS__</strong>
                <span class="home-profile-card__status">
                  <span class="home-profile-card__status-dot"></span>
                  Main Menu
                </span>
              </div>
            </div>

            <div class="home-profile-card__badge" aria-hidden="true">
              <svg class="home-icon home-icon--small"><use href="#icon-help-circle"></use></svg>
            </div>
          </div>

          <div class="home-profile-card__quest">
            <div class="home-profile-card__quest-top">
              <span class="home-profile-card__quest-label">Season Objective</span>
              <span class="home-profile-card__progress">
                <span class="is-filled"></span>
                <span></span>
                <span></span>
              </span>
            </div>
            <div class="home-profile-card__quest-bottom">
              <span class="home-profile-card__quest-title">3 WINS / WEEK</span>
              <span class="home-profile-card__reward">
                + 1 000
                <svg class="home-icon home-icon--tiny"><use href="#icon-hexagon"></use></svg>
              </span>
            </div>
          </div>
        </section>

        <section class="home-card home-friends-card">
          <header class="home-friends-card__header">
            <span class="home-friends-card__title">Friends</span>
            <div class="home-friends-card__actions">
              <button type="button" class="home-friends-card__icon-button" aria-label="Add friend">
                <svg class="home-icon home-icon--small"><use href="#icon-user-plus"></use></svg>
              </button>
              <button type="button" class="home-friends-card__icon-button" aria-label="Open group">
                <svg class="home-icon home-icon--small"><use href="#icon-users"></use></svg>
              </button>
            </div>
          </header>

          <button type="button" class="home-friends-card__filter">
            <svg class="home-icon home-icon--tiny"><use href="#icon-chevron-down"></use></svg>
            <span>In Game (4)</span>
          </button>

          <div class="home-friends-card__list">
            <button type="button" class="home-friend home-friend--active">
              <div class="home-friend__avatar-wrap">
                <img src="https://i.pravatar.cc/150?img=12" alt="" class="home-friend__avatar" />
                <span class="home-friend__status-badge">
                  <svg class="home-icon home-icon--tiny"><use href="#icon-swords"></use></svg>
                </span>
              </div>
              <span class="home-friend__copy">
                <span class="home-friend__name">Pami</span>
                <span class="home-friend__status-text">Playing Ranked Match</span>
              </span>
            </button>

            <button type="button" class="home-friend home-friend--online">
              <img src="https://i.pravatar.cc/150?img=33" alt="" class="home-friend__avatar" />
              <span class="home-friend__copy">
                <span class="home-friend__name">Sanya</span>
                <span class="home-friend__status-text home-friend__status-text--blue"
                  >Main Menu</span
                >
              </span>
              <span class="home-friend__invite">
                <svg class="home-icon home-icon--small"><use href="#icon-plus"></use></svg>
              </span>
            </button>

            <button type="button" class="home-friend home-friend--offline">
              <img src="https://i.pravatar.cc/150?img=68" alt="" class="home-friend__avatar" />
              <span class="home-friend__copy">
                <span class="home-friend__name">Bestanal</span>
                <span class="home-friend__status-text home-friend__status-text--muted"
                  >Offline</span
                >
              </span>
            </button>

            <button type="button" class="home-friend home-friend--offline">
              <img src="https://i.pravatar.cc/150?img=59" alt="" class="home-friend__avatar" />
              <span class="home-friend__copy">
                <span class="home-friend__name">Vex</span>
                <span class="home-friend__status-text home-friend__status-text--muted"
                  >Offline</span
                >
              </span>
            </button>
          </div>

          <footer class="home-friends-card__footer">
            <img
              src="https://i.pravatar.cc/150?img=11"
              alt=""
              class="home-friends-card__party-avatar"
            />
            <span class="home-friends-card__party-slot"></span>
            <span class="home-friends-card__party-slot"></span>
            <span class="home-friends-card__party-slot"></span>
            <span class="home-friends-card__party-slot"></span>
          </footer>
        </section>
      </aside>

      <section class="home-spotlight">
        <div class="home-spotlight__content">
          <span class="home-spotlight__eyebrow">Featured Fighter</span>
          <h1 class="home-spotlight__title">__HERO_NAME__</h1>

          <div class="home-spotlight__meta">
            <span class="home-spotlight__meta-accent">__HERO_TITLE__</span>
            <span class="home-spotlight__meta-divider"></span>
            <span class="home-spotlight__meta-text">__SEASON_NAME__</span>
          </div>

          <p class="home-spotlight__summary">__HOME_HEADLINE__</p>

          <div class="home-spotlight__loadout" aria-label="Featured loadout">
            <button type="button" class="home-spotlight__loadout-item is-red"></button>
            <button type="button" class="home-spotlight__loadout-item is-blue"></button>
            <button type="button" class="home-spotlight__loadout-item is-purple"></button>
            <button type="button" class="home-spotlight__loadout-item is-slate"></button>
            <button type="button" class="home-spotlight__loadout-item is-gold"></button>
          </div>

          <button type="button" class="home-spotlight__button">Match Details</button>
        </div>
      </section>

      <aside class="home-panel-column home-panel-column--right">
        <button type="button" class="home-feature-card home-feature-card--season">
          <span class="home-feature-card__media">
            <img
              src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&amp;w=2070&amp;auto=format&amp;fit=crop"
              alt=""
              class="home-feature-card__image"
            />
            <span
              class="home-feature-card__media-overlay home-feature-card__media-overlay--violet"
            ></span>
            <span class="home-feature-card__media-copy">
              <svg class="home-icon home-icon--xlarge"><use href="#icon-aperture"></use></svg>
              <strong>PRO CIRCUIT</strong>
            </span>
          </span>
          <span class="home-feature-card__body">
            <span class="home-feature-card__eyebrow">__SEASON_NAME__</span>
            <span class="home-feature-card__headline">__HOME_HEADLINE__</span>
          </span>
        </button>

        <button type="button" class="home-feature-card home-feature-card--live">
          <span class="home-feature-card__media home-feature-card__media--pattern">
            <span class="home-feature-card__pattern"></span>
            <span
              class="home-feature-card__media-overlay home-feature-card__media-overlay--emerald"
            ></span>
            <span class="home-feature-card__score-lights">
              <span class="is-red"></span>
              <span class="is-blue"></span>
            </span>
          </span>
          <span class="home-feature-card__body home-feature-card__body--split">
            <span>
              <span class="home-feature-card__eyebrow home-feature-card__eyebrow--live">
                <span class="home-feature-card__live-dot"></span>
                Live Popular Match
              </span>
              <span class="home-feature-card__headline">__APP_TITLE__</span>
              <span class="home-feature-card__subcopy">__HOME_SUMMARY__</span>
            </span>
            <span class="home-feature-card__score">28 - 36</span>
          </span>
        </button>
      </aside>
    </main>

    <footer class="home-footer">
      <div class="home-footer__left">
        <button
          type="button"
          class="home-voice-button __AUDIO_BUTTON_STATE_CLASS__"
          data-action="toggle-mute"
          aria-label="__AUDIO_STATE_LABEL__"
          title="__AUDIO_STATE_LABEL__"
        >
          <svg class="home-icon home-icon--medium"><use href="#__AUDIO_ICON_ID__"></use></svg>
        </button>
      </div>

      <label class="home-chat">
        <span class="home-chat__prefix">(Party):</span>
        <input
          type="text"
          class="home-chat__input"
          placeholder="Enter message or '/' for commands."
        />
        <span class="home-chat__actions" aria-hidden="true">
          <svg class="home-icon home-icon--medium"><use href="#icon-smile"></use></svg>
          <svg class="home-icon home-icon--medium"><use href="#icon-image"></use></svg>
        </span>
      </label>

      <div class="home-footer__right">
        <button type="button" class="home-play-button" data-action="play-now">Play</button>
      </div>
    </footer>
  </div>
</section>
