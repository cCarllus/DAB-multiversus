services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dab_auth}
      POSTGRES_USER: ${POSTGRES_USER:-dab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dab_local_password}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dab} -d ${POSTGRES_DB:-dab_auth}']
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev:backend"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dab}:${POSTGRES_PASSWORD:-dab_local_password}@postgres:5432/${POSTGRES_DB:-dab_auth}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?Set ACCESS_TOKEN_SECRET in .env}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REMEMBER_SESSION_DAYS: ${REMEMBER_SESSION_DAYS:-30}
      SESSION_TOKEN_TTL_HOURS: ${SESSION_TOKEN_TTL_HOURS:-12}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,null}
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres-data:
